<script>

const INK_OFFSETS=[[0,0],[-0.62,0],[0.62,0],[0,-0.52],[0,0.52],[-0.44,-0.36],[0.44,0.36]];

const prevX=new Float32Array(TARGET), prevY=new Float32Array(TARGET);
let prevReady=false, lastMotionTrailMetrics={count:0,avgDisplacement:0,p95Displacement:0};

const BODY_SHADE_BINS=8, BODY_ALPHA_BINS=5, BODY_WIDTH_BINS=6;

const bodyPaths=new Array(BODY_BUCKETS), bodyCounts=new Uint16Array(BODY_BUCKETS);
const bodyAlpha=[0.110,0.52,0.72,0.86,0.96];
const bodyWidth=[0.80,1.10,1.43,1.82,2.28,2.82];
const MASS_ALPHA_BINS=4, MASS_WIDTH_BINS=5, MASS_BUCKETS=MASS_ALPHA_BINS*MASS_WIDTH_BINS;
const massPaths=new Array(MASS_BUCKETS), massCounts=new Uint16Array(MASS_BUCKETS);
const massAlpha=[0.052,0.082,0.116,0.158], massWidth=[1.05,1.38,1.76,2.18,2.68];
const SHADOW_ALPHA_BINS=4, SHADOW_WIDTH_BINS=4, SHADOW_BUCKETS=SHADOW_ALPHA_BINS*SHADOW_WIDTH_BINS;
const shadowPaths=new Array(SHADOW_BUCKETS), shadowCounts=new Uint16Array(SHADOW_BUCKETS);
const shadowAlpha=[0.15,0.24,0.33,0.43], shadowWidth=[0.75,1.05,1.45,1.95];

function smoothUp(lo,hi,v){
  const t=Math.max(0,Math.min(1,(v-lo)/Math.max(0.0001,hi-lo)));
  return t*t*(3-2*t);
}
function hashUnit(n){
  let h=(n|0)>>>0;
  h^=h>>>16; h=Math.imul(h,0x7feb352d);
  h^=h>>>15; h=Math.imul(h,0x846ca68b);
  h^=h>>>16;
  return (h>>>0)/4294967295;
}
function alphaBin(alpha){
  return alpha<0.08?0:alpha<0.28?1:alpha<0.45?2:alpha<0.62?3:4;
}
function views(){
  const b=wasm.memory.buffer;
  return{
    alpha:new Float32Array(b,wasm.field_alpha_ptr(),MAX_PHRASES*FIELD_MAX),
    meta:new Float32Array(b,wasm.field_meta_ptr(),MAX_PHRASES*FIELD_META_STRIDE),
    sdf:new Float32Array(b,wasm.field_sdf_ptr(),MAX_PHRASES*FIELD_MAX),
    potential:new Float32Array(b,wasm.field_potential_ptr(),MAX_PHRASES*FIELD_MAX),
    fieldNx:new Float32Array(b,wasm.field_nx_ptr(),MAX_PHRASES*FIELD_MAX),
    fieldNy:new Float32Array(b,wasm.field_ny_ptr(),MAX_PHRASES*FIELD_MAX),
    fieldTx:new Float32Array(b,wasm.field_tx_ptr(),MAX_PHRASES*FIELD_MAX),
    fieldTy:new Float32Array(b,wasm.field_ty_ptr(),MAX_PHRASES*FIELD_MAX),
    targetRho:new Float32Array(b,wasm.field_target_rho_ptr(),MAX_PHRASES*FIELD_MAX),
    spine:new Float32Array(b,wasm.field_spine_ptr(),MAX_PHRASES*FIELD_MAX),
    anisotropy:new Float32Array(b,wasm.field_anisotropy_ptr(),MAX_PHRASES*FIELD_MAX),
    activation:new Float32Array(b,wasm.activation_ptr(),MAX_PHRASES*FIELD_MAX),
    out:new Float32Array(b,wasm.out_ptr(),TARGET*OUT_STRIDE),
    perf:new Float32Array(b,wasm.perf_ptr(),PERF_STRIDE),
    slotFx:new Float32Array(b,wasm.slot_fx_ptr(),MAX_PHRASES*SLOT_STRIDE),
    slotFy:new Float32Array(b,wasm.slot_fy_ptr(),MAX_PHRASES*SLOT_STRIDE),
    slotTx:new Float32Array(b,wasm.slot_tx_ptr(),MAX_PHRASES*SLOT_STRIDE),
    slotTy:new Float32Array(b,wasm.slot_ty_ptr(),MAX_PHRASES*SLOT_STRIDE),
    slotPriority:new Float32Array(b,wasm.slot_priority_ptr(),MAX_PHRASES*SLOT_STRIDE),
    heapX:new Float32Array(b,wasm.heap_x_ptr(),TARGET),
    heapY:new Float32Array(b,wasm.heap_y_ptr(),TARGET),
    captureS:new Float32Array(b,wasm.capture_s_ptr(),TARGET),
    traceLen:new Float32Array(b,wasm.trace_len_ptr(),TARGET),
    rotationTrace:new Float32Array(b,wasm.rotation_trace_ptr(),TARGET),
    particleState:new Float32Array(b,wasm.particle_state_ptr(),TARGET)
  };
}
function resizeCanvas(){
  const iw=innerWidth||1280, ih=innerHeight||800;
  W=cv.width=Math.round(iw*DPR); H=cv.height=Math.round(ih*DPR);
  cv.style.width=iw+'px'; cv.style.height=ih+'px';
}
function planTextRaster(text,g){
  const glyphText=text;
  const words=glyphText.split(/\s+/).filter(Boolean);
  let lines=[glyphText];
  if(glyphText.length>14&&words.length>1){
    let best=1, bestScore=1e9;
    for(let k=1;k<words.length;k++){
      const a=words.slice(0,k).join(' '), b=words.slice(k).join(' ');
      const score=Math.abs(a.length-b.length)+Math.max(a.length,b.length)*0.08;
      if(score<bestScore){best=k;bestScore=score;}
    }
    lines=[words.slice(0,best).join(' '),words.slice(best).join(' ')];
  }
  const maxLineLen=Math.max(...lines.map(line=>line.length));
  const targetWidth=FIELD_W*(lines.length>1?0.54:0.86);
  let fs=Math.min(FIELD_H*(lines.length>1?0.30:0.32), targetWidth/(maxLineLen*0.48));
  g.font='900 '+fs+'px "LiveSteelProof","Arial Black","Segoe UI",Arial,sans-serif';
  let tracking=fs*0.055;
  let wordGap=fs*0.10;
  const measureLine=line=>{
    let width=0;
    for(const ch of line)width+=g.measureText(ch).width+(ch===' '?wordGap:0);
    return width+Math.max(0,line.length-1)*tracking;
  };
  let measured=Math.max(...lines.map(line=>measureLine(line)));
  if(measured>targetWidth){
    fs*=targetWidth/measured;
    g.font='900 '+fs+'px "LiveSteelProof","Arial Black","Segoe UI",Arial,sans-serif';
    tracking=fs*0.055;
    wordGap=fs*0.10;
    measured=Math.max(...lines.map(line=>measureLine(line)));
  }
  const charEdges=line=>{
    const edges=[0];
    let x=0;
    for(let i=0;i<line.length;i++){
      x+=g.measureText(line[i]).width+(line[i]===' '?wordGap:0);
      if(i<line.length-1)x+=tracking;
      edges.push(x);
    }
    return edges;
  };
  const lineGap=fs*0.92;
  const linePlans=lines.map((line,i)=>{
    const width=measureLine(line);
    const y=FIELD_H/2+(i-(lines.length-1)/2)*lineGap;
    return{line,y,width,x0:FIELD_W/2-width/2,x1:FIELD_W/2+width/2,edges:charEdges(line)};
  });
  return{lines,linePlans,fs,lineGap,targetWidth,tracking,wordGap};
}
function rasterAlpha(text){
  const glyphText=text;
  const o=document.createElement('canvas'); o.width=FIELD_W; o.height=FIELD_H;
  const g=o.getContext('2d',{willReadFrequently:true});
  const plan=planTextRaster(glyphText,g);
  g.fillStyle='#000'; g.fillRect(0,0,FIELD_W,FIELD_H);
  g.fillStyle='#fff'; g.textAlign='left'; g.textBaseline='middle';
  for(const line of plan.linePlans){
    for(let ci=0;ci<line.line.length;ci++){
      const ch=line.line[ci];
      const x0=line.x0+line.edges[ci];
      for(const [ox,oy] of INK_OFFSETS)g.fillText(ch,x0+ox,line.y+oy);
    }
  }
  const im=g.getImageData(0,0,FIELD_W,FIELD_H).data;
  const a=new Float32Array(FIELD_MAX);
  let minX=FIELD_W,maxX=0,minY=FIELD_H,maxY=0,mass=0;
  for(let yy=0;yy<FIELD_H;yy++)for(let xx=0;xx<FIELD_W;xx++){
    const v=im[(yy*FIELD_W+xx)*4]/255;
    const aa=v<0.02?0:Math.min(1,Math.pow(v,0.82));
    a[yy*FIELD_W+xx]=aa;
    if(aa>0.12){if(xx<minX)minX=xx;if(xx>maxX)maxX=xx;if(yy<minY)minY=yy;if(yy>maxY)maxY=yy;mass+=aa;}
  }
  if(mass<=0){minX=maxX=FIELD_W/2;minY=maxY=FIELD_H/2;}
  return{alpha:a,bounds:{minX,maxX,minY,maxY,mass}};
}
function loadFields(){
  for(let pi=0;pi<PHRASES.length;pi++){
    const v=views();
    const f=rasterAlpha(PHRASES[pi]), base=pi*FIELD_MAX, mb=pi*FIELD_META_STRIDE;
    v.alpha.set(f.alpha,base);
    v.meta[mb]=FIELD_W; v.meta[mb+1]=FIELD_H;
    v.meta[mb+2]=f.bounds.minX*W/FIELD_W; v.meta[mb+3]=(f.bounds.maxX+1)*W/FIELD_W;
    v.meta[mb+4]=f.bounds.minY*H/FIELD_H; v.meta[mb+5]=(f.bounds.maxY+1)*H/FIELD_H;
    v.meta[mb+6]=f.bounds.mass; v.meta[mb+7]=1;
    wasm.sim_rebuild_field(pi);
  }
}
function rebuild(){
  resizeCanvas();
  if(!wasm)return;
  wasm.sim_config(PHRASES.length,W,H);
  loadFields();
  wasm.sim_reset_seed(FIXED_SEED);
}
function phaseName(p){return p===0?'assemble':p===1?'dwell':'morph';}
function fadeBackground(){
  x.globalCompositeOperation='source-over';
  x.fillStyle='rgba(5,6,6,0.62)';
  x.fillRect(0,0,W,H);
  const g=x.createRadialGradient(W*0.42,H*0.53,0,W*0.42,H*0.53,Math.max(W,H)*0.64);
  g.addColorStop(0,'rgba(28,29,25,0.030)');
  g.addColorStop(0.62,'rgba(8,9,8,0.026)');
  g.addColorStop(1,'rgba(0,0,0,0.22)');
  x.fillStyle=g; x.fillRect(0,0,W,H);
}
function drawContactShadows(out){
  x.globalCompositeOperation='source-over';
  x.lineCap='butt';
  shadowCounts.fill(0);
  for(let b=0;b<SHADOW_BUCKETS;b++)shadowPaths[b]=null;
  for(let i=0;i<TARGET;i++){
    const o=i*OUT_STRIDE, active=out[o+5], field=out[o+6], chain=out[o+7], pressure=out[o+8];
    const anchored=Math.max(field,chain*0.72);
    if(active<0.12&&anchored<0.14)continue;
    if(anchored<0.10&&(i%4)!==0)continue;
    if(active<0.55&&anchored<0.22&&(i%2)!==0)continue;
    const px=out[o]+1.8*DPR, py=out[o+1]+2.4*DPR, a=out[o+2], len=out[o+3], rad=out[o+4];
    const L=len*(0.96+field*0.10)*DPR, ca=Math.cos(a)*L, sa=Math.sin(a)*L;
    const width=Math.max(0.7,rad*(1.9+pressure*0.35));
    const alpha=(0.055+0.18*active+0.09*pressure)*(0.45+0.55*Math.min(1,anchored*1.4));
    const wb=Math.max(0,Math.min(SHADOW_WIDTH_BINS-1,Math.floor((width-0.7)/0.45)));
    const ab=alpha<0.20?0:alpha<0.29?1:alpha<0.38?2:3;
    const key=ab*SHADOW_WIDTH_BINS+wb;
    let path=shadowPaths[key];
    if(!path)path=shadowPaths[key]=new Path2D();
    path.moveTo(px-ca*.5,py-sa*.5); path.lineTo(px+ca*.5,py+sa*.5);
    shadowCounts[key]++;
  }
  for(let key=0;key<SHADOW_BUCKETS;key++){
    if(!shadowCounts[key])continue;
    const wb=key%SHADOW_WIDTH_BINS, ab=Math.floor(key/SHADOW_WIDTH_BINS);
    x.lineWidth=shadowWidth[wb]*DPR;
    x.strokeStyle='rgba(0,0,0,'+shadowAlpha[ab].toFixed(3)+')';
    x.stroke(shadowPaths[key]);
  }
}
function drawBodies(out){
  x.globalCompositeOperation='source-over';
  x.lineCap='butt';
  bodyCounts.fill(0);
  for(let b=0;b<BODY_BUCKETS;b++)bodyPaths[b]=null;
  massCounts.fill(0);
  for(let b=0;b<MASS_BUCKETS;b++)massPaths[b]=null;
  let scratchPath=null;
  for(let i=0;i<TARGET;i++){
    const o=i*OUT_STRIDE, px=out[o], py=out[o+1], a=out[o+2], len=out[o+3], rad=out[o+4];
    const active=out[o+5], field=out[o+6], chain=out[o+7], pressure=out[o+8], depth=out[o+10], rough=out[o+11], structural=out[o+13]||0;
    const material=materialOfOut(out,o);
    if(material<0.075&&(i%4)!==0)continue;
    const chip=0.88+0.10*Math.sin(rough*41.0+depth*13.0);
    const L=len*chip*(0.90+0.12*field)*DPR, ca=Math.cos(a)*L, sa=Math.sin(a)*L;
    if(material>0.18){
      const mw=Math.max(0.95,rad*(1.38+1.02*material+0.34*chain+pressure*0.18+structural*0.30));
      const ma=Math.min(0.22,0.048+0.078*active+0.054*chain+0.034*field+0.034*structural);
      const mwb=Math.max(0,Math.min(MASS_WIDTH_BINS-1,Math.floor((mw-0.85)/0.42)));
      const mab=ma<0.10?0:ma<0.145?1:ma<0.195?2:3;
      const mkey=mab*MASS_WIDTH_BINS+mwb;
      let mpath=massPaths[mkey];
      if(!mpath)mpath=massPaths[mkey]=new Path2D();
      mpath.moveTo(px-ca*.5,py-sa*.5); mpath.lineTo(px+ca*.5,py+sa*.5);
      massCounts[mkey]++;
    }
    const body=Math.min(235,58+Math.floor(44*material+76*field+58*chain+28*structural+24*depth+12*(1-rough)));
    const captureGlow=Math.max(active,field,chain);
    const alpha=captureGlow<0.10
      ?Math.min(0.17,0.034+0.168*material+0.018*depth+0.030*structural)
      :Math.min(0.98,0.23+0.63*active+0.27*chain+0.21*field+0.15*structural);
    const width=Math.max(0.54,rad*(0.86+0.90*material+field*0.36+pressure*0.18+structural*0.22));
    const sb=Math.max(0,Math.min(BODY_SHADE_BINS-1,Math.floor((body-28)/12.5)));
    const ab=alphaBin(alpha);
    const wb=Math.max(0,Math.min(BODY_WIDTH_BINS-1,Math.floor((width-0.45)/0.28)));
    const key=(sb*BODY_ALPHA_BINS+ab)*BODY_WIDTH_BINS+wb;
    let path=bodyPaths[key];
    if(!path)path=bodyPaths[key]=new Path2D();
    path.moveTo(px-ca*.5,py-sa*.5); path.lineTo(px+ca*.5,py+sa*.5);
    bodyCounts[key]++;
    if(rough>0.72&&active>0.22){
      const cut=0.45+0.25*rough, dx=Math.cos(a)*rad*cut*DPR, dy=Math.sin(a)*rad*cut*DPR;
      if(!scratchPath)scratchPath=new Path2D();
      scratchPath.moveTo(px+ca*.5-dx,py+sa*.5-dy); scratchPath.lineTo(px+ca*.5+dx,py+sa*.5+dy);
    }
  }
  for(let key=0;key<MASS_BUCKETS;key++){
    if(!massCounts[key])continue;
    const wb=key%MASS_WIDTH_BINS, ab=Math.floor(key/MASS_WIDTH_BINS);
    x.lineWidth=massWidth[wb]*DPR;
    x.strokeStyle='rgba(31,35,36,'+massAlpha[ab].toFixed(3)+')';
    x.stroke(massPaths[key]);
  }
  for(let key=0;key<BODY_BUCKETS;key++){
    if(!bodyCounts[key])continue;
    const wb=key%BODY_WIDTH_BINS, ab=Math.floor(key/BODY_WIDTH_BINS)%BODY_ALPHA_BINS;
    const sb=Math.floor(key/(BODY_WIDTH_BINS*BODY_ALPHA_BINS));
    const body=Math.min(222,62+sb*20);
    x.lineWidth=bodyWidth[wb]*DPR;
    x.strokeStyle='rgba('+body+','+Math.min(218,body+8)+','+Math.min(212,body+4)+','+bodyAlpha[ab].toFixed(3)+')';
    x.stroke(bodyPaths[key]);
  }
  if(scratchPath){
    x.strokeStyle='rgba(8,9,8,0.20)';
    x.lineWidth=Math.max(0.40,0.48*DPR);
    x.stroke(scratchPath);
  }
}
function drawGlints(out){
  x.globalCompositeOperation='lighter';
  x.lineCap='butt';
  const lightX=-0.42, lightY=-0.91, perpX=-lightY, perpY=lightX;
  let count=0, activeCount=0;
  for(let i=0;i<TARGET;i++){
    const o=i*OUT_STRIDE, active=out[o+5], field=out[o+6];
    if(active>0.18||field>0.22)activeCount++;
    if(active<0.16&&field<0.18)continue;
    const angle=out[o+2], chain=out[o+7], glintSeed=out[o+9], rough=out[o+11], speed=out[o+12];
    const ax=Math.cos(angle), ay=Math.sin(angle);
    const specAxis=Math.pow(Math.abs(ax*perpX+ay*perpY),11);
    const specMotion=smoothUp(0.05,1.80,speed);
    const specChain=0.35+0.65*chain;
    const specRough=0.20+0.80*rough;
    const hotFront=smoothUp(1.10,2.40,speed);
    const spec=specAxis*specChain*specRough*(0.56+0.44*specMotion)*(1.45+2.55*glintSeed);
    if(spec<0.42+0.155*hotFront)continue;
    count++;
    const px=out[o], py=out[o+1], len=out[o+3], rad=out[o+4];
    const L=len*(0.12+0.22*Math.min(1,spec))*DPR, ca=ax*L, sa=ay*L;
    x.lineWidth=Math.max(0.35,rad*(0.24+chain*0.14))*DPR;
    x.strokeStyle='rgba(190,194,181,'+(0.09+Math.min(0.25,spec*0.20)).toFixed(3)+')';
    x.beginPath(); x.moveTo(px-ca*.5,py-sa*.5); x.lineTo(px+ca*.5,py+sa*.5); x.stroke();
  }
  x.globalCompositeOperation='source-over';
  return{glintCount:count,activeCount};
}
function drawLooseDust(out){
  x.globalCompositeOperation='source-over';
  x.lineCap='butt';
  for(let i=0;i<TARGET;i++){
    const o=i*OUT_STRIDE, active=out[o+5], field=out[o+6], chain=out[o+7];
    const anchored=Math.max(field,chain*0.72);
    if(anchored>0.065)continue;
    if(active>0.40){if((i%5)!==0)continue;}
    else if(active>0.09){if((i%9)!==0)continue;}
    else if((i%7)!==0)continue;
    const px=out[o], py=out[o+1], a=out[o+2], len=out[o+3]*0.62, rad=out[o+4], depth=out[o+10];
    const L=len*DPR, ca=Math.cos(a)*L, sa=Math.sin(a)*L;
    x.lineWidth=Math.max(0.35,rad*0.45)*DPR;
    x.strokeStyle='rgba(48,54,50,'+(0.003+0.007*depth+0.010*Math.min(1,active)).toFixed(3)+')';
    x.beginPath(); x.moveTo(px-ca*.5,py-sa*.5); x.lineTo(px+ca*.5,py+sa*.5); x.stroke();
  }
}
function drawMotionTrails(out){
  let count=0,sum=0;
  const distances=[];
  const perf=views().perf;
  const assembleTrailBoost=(perf[1]|0)===0&&perf[0]>1.10;
  const minDistance=assembleTrailBoost?0.48:1.2;
  const minSpeed=assembleTrailBoost?0.16:0.42;
  const minAlpha=assembleTrailBoost?0.004:0.006;
  x.globalCompositeOperation='lighter';
  x.lineCap='butt';
  if(prevReady){
    for(let i=0;i<TARGET;i++){
      const o=i*OUT_STRIDE, field=out[o+6], chain=out[o+7], speed=out[o+12];
      const material=materialOfOut(out,o);
      const dx=out[o]-prevX[i], dy=out[o+1]-prevY[i];
      const d=Math.hypot(dx,dy);
      if(d<minDistance||speed<minSpeed||material<0.12)continue;
      const lock=Math.max(field,chain);
      const alpha=Math.min(0.13,(0.018+speed*0.020+d*0.010)*Math.max(0.10,1-lock*0.72));
      if(alpha<minAlpha)continue;
      const px=out[o], py=out[o+1], back=Math.min(18,d*1.65)*DPR;
      const nx=dx/Math.max(0.001,d), ny=dy/Math.max(0.001,d);
      const shade=118+Math.floor(Math.min(1,material)*72);
      x.lineWidth=Math.max(0.35,out[o+4]*0.52)*DPR;
      x.strokeStyle='rgba('+shade+','+Math.min(214,shade+8)+','+Math.min(208,shade+4)+','+alpha.toFixed(3)+')';
      x.beginPath();
      x.moveTo(px-nx*back,py-ny*back);
      x.lineTo(px,py);
      x.stroke();
      count++;
      sum+=d;
      distances.push(d);
    }
  }
  for(let i=0;i<TARGET;i++){
    const o=i*OUT_STRIDE;
    prevX[i]=out[o];
    prevY[i]=out[o+1];
  }
  prevReady=true;
  distances.sort((a,b)=>a-b);
  lastMotionTrailMetrics={
    count,
    avgDisplacement:count?+(sum/count).toFixed(4):0,
    p95Displacement:count?+distances[Math.min(count-1,Math.floor(count*0.95))].toFixed(4):0
  };
  x.globalCompositeOperation='source-over';
}
function drawCausalTraces(out){
  const p=views().perf, phase=p[1]|0, phaseS=p[0]||0;
  const fade=phase===0?(1-smoothUp(0.72,0.98,phaseS/4.0)):phase===2?(1-smoothUp(0.10,0.42,phaseS/3.3)):0;
  let count=0,sum=0;

  for(let si0=0;si0<slotCount;si0++){

    const si=base+si0, o=particle*OUT_STRIDE;

    if(isLocked)weightedLocked+=priority;

    lockedRatio:slotCount?+(lockedCount/slotCount).toFixed(4):0,
    weightedLockedRatio:weighted?+(weightedLocked/weighted).toFixed(4):0,
    distancePx:statsOf(dist),

function downsampledCoverageRegion(alpha,occ,block){
  let support=0,covered=0,strong=0,holeSupport=0,holeCovered=0,sumAlpha=0,sumOcc=0,weak=0;
  for(let by=0;by<FIELD_H;by+=block){
    for(let bx=0;bx<FIELD_W;bx+=block){
      let aSum=0,oSum=0,n=0;
      for(let yy=by;yy<Math.min(FIELD_H,by+block);yy++){
        for(let xx=bx;xx<Math.min(FIELD_W,bx+block);xx++){
          const i=yy*FIELD_W+xx;
          aSum+=alpha[i]; oSum+=occ[i]; n++;
        }
      }
      const a=aSum/Math.max(1,n), o=oSum/Math.max(1,n);
      if(a>0.12){
        support++; sumAlpha+=a; sumOcc+=o;
        if(o>0.030)covered++; else weak++;
        if(o>0.090)strong++;
      }else if(a<0.025){
        holeSupport++;
        if(o>0.080)holeCovered++;
      }
    }
  }
  return{
    block,
    support,
    coveredRatio:support?+(covered/support).toFixed(4):0,
    strongRatio:support?+(strong/support).toFixed(4):0,
    occPerAlpha:+(sumOcc/Math.max(0.0001,sumAlpha)).toFixed(4),
    weak,
    holePreservation:holeSupport?+(1-holeCovered/holeSupport).toFixed(4):1
  };
}
function slotLatticeCoverage(phrase,fillRatio){
  const phraseIdx=Math.max(0,Math.min(PHRASES.length-1,phrase|0));
  const v=views(), alpha=fieldCopy(0,phraseIdx), occ=new Float32Array(FIELD_MAX);
  const slotCount=Math.min(wasm.slot_count(phraseIdx)>>>0,TARGET,SLOT_STRIDE);
  const base=phraseIdx*SLOT_STRIDE, ranked=[];
  for(let i=0;i<slotCount;i++){
    const priority=Math.max(0.001,v.slotPriority[base+i]);
    const tie=hashUnit((i+1)*2654435761+phraseIdx*1013904223);
    ranked.push({i,score:priority*0.92+(1-tie)*0.08,priority});
  }
  ranked.sort((a,b)=>b.score-a.score);
  const selected=Math.max(0,Math.min(slotCount,Math.round(slotCount*fillRatio)));
  for(let r=0;r<selected;r++){
    const item=ranked[r], si=base+item.i;
    const px=v.slotFx[si]*W/FIELD_W, py=v.slotFy[si]*H/FIELD_H;
    const a=Math.atan2(v.slotTy[si],v.slotTx[si]);
    const len=2.2+item.priority*3.2;
    const amount=(0.64+item.priority*0.34)/5;
    const ca=Math.cos(a), sa=Math.sin(a);
    for(let k=0;k<5;k++){
      const u=k/4-0.5;
      depositCoverage(occ,px+ca*len*u,py+sa*len*u,amount);
    }
  }
  return{alpha,occ,slotCount,selected};
}
window.__staticLatticeAudit=(phrase=debugPhrase(),fills=[1,0.8,0.6])=>{
  const phraseIdx=Math.max(0,Math.min(PHRASES.length-1,phrase|0));
  return{
    phrase:PHRASES[phraseIdx],
    phraseIndex:phraseIdx,
    fills:fills.map(fill=>{
      const c=slotLatticeCoverage(phraseIdx,Math.max(0,Math.min(1,+fill)));
      return{
        fillRatio:+fill,
        slotCount:c.slotCount,
        selected:c.selected,
        all:coverageRegion(c.alpha,c.occ,0,FIELD_H),
        small2:downsampledCoverageRegion(c.alpha,c.occ,2),
        small4:downsampledCoverageRegion(c.alpha,c.occ,4),
        shape2:shapeMatchRegion(c.alpha,c.occ,2),
        shape4:shapeMatchRegion(c.alpha,c.occ,4),
        letters:letterAuditFromOcc(c.alpha,c.occ,phraseIdx)
      };
    })
  };
};
window.__motionProbe=(steps=1)=>{
  running=false;
  const before=views().out.slice();
  window.__steps(Math.max(1,steps|0));
  const after=views().out;
  const active=[],loose=[];
  for(let i=0;i<TARGET;i++){
    const o=i*OUT_STRIDE;
    const material=Math.max(before[o+5],before[o+6]*0.86,before[o+7]*0.58);
    const dx=after[o]-before[o], dy=after[o+1]-before[o+1];
    const d=Math.sqrt(dx*dx+dy*dy);
    if(material>0.28)active.push(d);
    if(material<0.08)loose.push(d);
  }
  const stat=arr=>{
    arr.sort((a,b)=>a-b);
    const n=arr.length, sum=arr.reduce((a,b)=>a+b,0);
    return{
      n,
      avg:n?+(sum/n).toFixed(4):0,
      p50:n?+arr[Math.floor(n*0.50)].toFixed(4):0,
      p95:n?+arr[Math.min(n-1,Math.floor(n*0.95))].toFixed(4):0,
      max:n?+arr[n-1].toFixed(4):0
    };
  };
  return{steps,active:stat(active),loose:stat(loose),report:proofReport()};
};
window.__simOnly=(frames=600)=>{
  running=false; DEBUG=false; window.__debugField=0; window.__reset(FIXED_SEED);
  const count=Math.max(1,frames|0), t0=performance.now();
  for(let k=0;k<count;k++)wasm.sim_step(16.67);
  const elapsed=performance.now()-t0;
  draw();
  return{frames:count,msPerStep:+(elapsed/count).toFixed(4),report:proofReport(),coverage:window.__coverage(debugPhrase())};
};
window.__pixelStats=()=>{
  const data=x.getImageData(0,0,W,H).data;
  let maxRGB=0,over128=0,over180=0,whiteish=0,blueDominant=0,lit=0;
  for(let i=0;i<data.length;i+=4){
    const r=data[i],g=data[i+1],b=data[i+2],m=Math.max(r,g,b);
    if(m>maxRGB)maxRGB=m;
    if(m>128)over128++;
    if(m>180)over180++;
    if(r>170&&g>170&&b>160)whiteish++;
    if(b>48&&b>r*1.08&&b>g*1.04)blueDominant++;
    if(m>32)lit++;
  }
  const total=data.length/4;
  return{
    total,maxRGB,over128,over180,whiteish,blueDominant,lit,
    over128Ratio:+(over128/total).toFixed(6),
    over180Ratio:+(over180/total).toFixed(6),
    blueDominantRatio:+(blueDominant/total).toFixed(6),
    litRatio:+(lit/total).toFixed(6)
  };
};
window.__captureProofSet=async()=>{
  running=false; DEBUG=false; window.__debugField=0; window.__reset(FIXED_SEED);
  let done=0; const frames=[];
  for(const frame of PROOF_FRAMES){
    window.__steps(frame-done); done=frame;
    frames.push({frame,dataUrl:cv.toDataURL('image/png'),report:proofReport(),pixel:window.__pixelStats(),coverage:window.__coverage(debugPhrase())});
  }
  return frames;
};
window.__captureDebugSet=async(frame=330)=>{
  running=false; DEBUG=false; window.__debugField=0; window.__reset(FIXED_SEED); window.__steps(frame|0);
  const modes=[1,2,3,4,5,6,7,8,9], frames=[];
  for(const mode of modes){
    window.__debugField=mode; draw();
    frames.push({mode,dataUrl:cv.toDataURL('image/png')});
  }
  window.__debugField=0; draw();
  return frames;
};
